<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>dockercd</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="header">
    <a href="#/apps" class="header-logo">
      <img src="favicon.svg" alt="">
      dockercd
    </a>
    <nav class="header-nav-links">
      <a href="#/apps" class="nav-link" id="nav-apps">Applications</a>
<span class="nav-detail-name" id="nav-detail-name"></span>
    </nav>
    <div class="header-status">
      <span class="cmd-palette-hint" id="cmd-palette-hint" title="Command palette"><kbd>&#8984;K</kbd></span>
      <button class="notification-bell" id="notification-bell" title="Notifications">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M8 1.5A4.5 4.5 0 0 0 3.5 6v2.5L2 10.5v1h12v-1l-1.5-2V6A4.5 4.5 0 0 0 8 1.5z" stroke="currentColor" stroke-width="1.2" fill="none"/><path d="M6 12.5a2 2 0 0 0 4 0" stroke="currentColor" stroke-width="1.2" fill="none"/></svg>
        <span class="notification-badge" id="notification-badge" style="display:none">0</span>
      </button>
      <div class="notification-panel" id="notification-panel" style="display:none"></div>
      <span id="refresh-dot" class="refresh-dot paused"></span>
      <select id="refresh-interval" class="refresh-select" title="Auto-refresh interval">
        <option value="300000">5 min</option>
        <option value="600000" selected>10 min</option>
        <option value="900000">15 min</option>
        <option value="1800000">30 min</option>
        <option value="3600000">60 min</option>
      </select>
    </div>
  </header>
  <main class="main" id="app">
    <div class="loading"><div class="spinner"></div>Loading...</div>
  </main>
  <div class="toast-container" id="toasts"></div>
  <div id="cmd-palette-root"></div>
  <script src="js/api.js"></script>
  <script src="js/components.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
