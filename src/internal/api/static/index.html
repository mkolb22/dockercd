<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>dockercd</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="header">
    <a href="#/apps" class="header-logo">
      <img src="favicon.svg" alt="">
      dockercd
    </a>
    <nav class="header-nav-links">
      <a href="#/apps" class="nav-link" id="nav-apps">Applications</a>
      <a href="#/hosts" class="nav-link" id="nav-hosts">Hosts</a>
    </nav>
    <nav class="header-nav" id="breadcrumb"></nav>
    <div class="header-status">
      <span id="refresh-dot" class="refresh-dot paused"></span>
      <select id="refresh-interval" class="refresh-select" title="Auto-refresh interval">
        <option value="300000">5 min</option>
        <option value="600000" selected>10 min</option>
        <option value="900000">15 min</option>
        <option value="1800000">30 min</option>
        <option value="3600000">60 min</option>
      </select>
    </div>
  </header>
  <main class="main" id="app">
    <div class="loading"><div class="spinner"></div>Loading...</div>
  </main>
  <div class="toast-container" id="toasts"></div>
  <script src="js/api.js"></script>
  <script src="js/components.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
