# SECTION 3: USER PAIN POINTS AND FEATURE REQUESTS

## 3.1 From GitHub Issues and Community Discussions

### Rollback (CRITICAL gap across all tools)
- Dokploy issues: #827 (rollback older versions), #319 (roll back service), #2771 (docker-compose rollback).
- Docker Compose itself: issue #1174 requesting "deployment/releases functionality".
- Community consensus: rollback is the single most requested feature for compose-based deploys.
- Evidence: multiple open issues across ALL major tools requesting this same feature.

### Secrets Management (HIGH demand)
- Watchtower issue #1711: secrets in compose file committed to Git -- security risk.
- Community pattern: SOPS is the accepted solution but no tool integrates it natively.
- Two models needed:
  1. Encrypted secrets in Git (SOPS/age): decrypt at deploy time.
  2. Referenced secrets (Vault/AWS SM): fetch at deploy time.
- doco-cd supports SOPS. No other compose GitOps tool does.

### Deployment Visibility (HIGH demand)
- "No UI" is the top complaint about doco-cd, conops.
- Users want: what's deployed, what commit, health status, last sync time -- in a dashboard.
- Portainer provides this but buries it in a full management platform.
- Opportunity: ArgoCD-quality app tree visualization for Docker Compose.

### Multi-Host / Remote Docker (MEDIUM demand)
- Users managing 2-5 servers want one tool to manage all.
- Komodo solves this with an agent model but requires the Periphery binary on each host.
- Single-binary approach: connect to remote Docker hosts via tcp:// or SSH tunnel.
- dockercd already has DockerHost field in DestinationSpec -- this is partially designed.

### GitOps for Existing Manually Managed Stacks (MEDIUM demand)
- Pain: "I have stacks running. I want GitOps without starting fresh."
- Feature needed: "adopt" a running compose project -- inspect live state, generate initial app record, start reconciling.
- No tool offers this. Requires diff engine (which dockercd has).

### Image Update Policy (MEDIUM demand)
- Watchtower's core value: when a new image tag is available, redeploy.
- GitOps purists reject this (image tag should be in Git). But users want both.
- Hybrid: when new image available on registry, auto-create a PR to bump the tag in Git.
- ArgoCD Image Updater does this for Kubernetes. No equivalent for Docker Compose.

