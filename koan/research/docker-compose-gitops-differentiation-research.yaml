# SECTION 2: ARGOCD FEATURES THAT DON'T EXIST FOR DOCKER COMPOSE

## 2.1 Features ArgoCD users love that have NO equivalent for Docker Compose

### 1. Pre-Sync Diff Preview ("dry run")
- ArgoCD shows exactly what will change before applying, with colored diffs per resource.
- No Docker Compose tool offers a comparable diff-before-apply in a UI.
- dockercd has the diff engine -- this is a UI/API gap to close first.

### 2. Sync Waves with Health Gates
- ArgoCD: annotate resources with argocd.argoproj.io/sync-wave=N to control order.
- Gate: wave N+1 only starts after all wave N resources are Healthy.
- For Docker Compose: maps to deploying services in labeled batches with health-gate.
- NO existing Docker Compose tool implements this. doco-cd, conops, portainer all skip it.
- Technically feasible via labels: dockercd.sync-wave=0 on compose services.

### 3. Application Health Aggregation ("worst child" rollup)
- ArgoCD computes app health as worst of all resource health states.
- Displays per-resource and per-app health in a resource tree.
- doco-cd: no health model. conops: basic container state. portainer: container state only.
- dockercd already has the health aggregation logic -- needs the UI tree visualization.

### 4. Rollback to Any Previous Git SHA
- ArgoCD: click any history entry, click rollback, deploys that exact commit state.
- Docker Compose ecosystem: no tool offers this. Dokploy rollback only works for Dockerfile apps.
- Implementation: store commit SHA + compose spec snapshot per sync. Re-deploy from snapshot.

### 5. Audit Trail / Sync History
- ArgoCD: every sync operation recorded with: who triggered it, what changed, outcome, duration.
- Docker Compose tools: Portainer has some logging. Others have minimal or none.
- dockercd has SyncResult type and SQLite store -- needs full history query API + UI.

### 6. Notifications on State Transitions
- ArgoCD Notifications: Slack/webhook/email on SyncFailed, Degraded, OutOfSync, Synced events.
- Docker Compose tools: doco-cd has notifications (basic). Others mostly lack this.
- Opportunity: structured notification system with configurable triggers and channels.

### 7. Multi-Application Dependency (App of Apps)
- ArgoCD: one app can declare another app as a dependency.
- No Docker Compose tool supports cross-application deployment ordering.
- Use case: "deploy database stack before web stack".

### 8. Pre/Post Sync Hooks
- ArgoCD: Job resources annotated as PreSync/PostSync hooks (migrations, tests, backups).
- Docker Compose equivalent: run a specific service as a one-shot task before/after sync.
- doco-cd: does not implement. portainer: does not implement. conops: does not implement.
- dockercd has hooks in SyncPolicy but implementation unknown -- needs verification.

### 9. Self-Heal with Exclusions
- ArgoCD: selfHeal=true reverts manual changes, but you can annotate specific resources to be excluded.
- Docker Compose tools: basic self-heal (restart containers) but no exclusion mechanism.
- Use case: "self-heal the web container but not the worker (manually scaled)".

### 10. Progressive Delivery (Canary / Blue-Green)
- ArgoCD has Argo Rollouts for this. No equivalent exists for Docker Compose.
- Blue-green for Compose: manually possible with two project names + load balancer swap.
- Canary for Compose: possible with Traefik weighted routing + two service definitions.
- No tool automates this. High-complexity but high-differentiation feature.
- Technically feasible as a label-driven strategy: dockercd.strategy=blue-green.

