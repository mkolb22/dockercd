# SECTION 5: SECRETS MANAGEMENT APPROACHES

## 5.1 Two Architectural Models

### Model A: Encrypted Secrets in Git (SOPS/age)
- Secrets committed as encrypted YAML/ENV to the repo.
- dockercd decrypts at deploy time using age key or KMS.
- doco-cd already does this. Validates the approach.
- Requires: age/SOPS library in Go, key management (secret or mounted file).

### Model B: Referenced Secrets from External Store
- compose file references secrets by name: ${SECRET_DB_PASS}.
- dockercd fetches actual values from Vault/AWS Secrets Manager/1Password at deploy time.
- Substitutes values before passing to docker compose.
- No Docker Compose GitOps tool currently does this.
- Requires: pluggable secret provider interface (Vault, AWS SM, Doppler, etc.).

## 5.2 Security Requirement
- Secret values must NEVER be logged or stored in SQLite.
- Secret references (not values) stored in app spec.

---

# SECTION 6: DRIFT DETECTION AND IaC RECONCILIATION

## 6.1 Drift in Docker Compose Context
- Definition: containers running with different config than what compose file specifies.
  Examples: image tag rolled back manually, env var changed via docker exec, port changed.
- ArgoCD detects this in seconds via Kubernetes watch API.
- Docker Compose equivalent: docker inspect + compare with parsed compose spec.
- dockercd already does this in the differ module.

## 6.2 Self-Healing Behavior
- ArgoCD best practice: enable drift detection + alerting first, enable auto-remediation after confidence.
- Docker Compose equivalent: selfHeal=false generates OutOfSync status + notification.
  selfHeal=true automatically re-applies compose spec.
- Exclusions needed: "selfHeal=true but ignore replica counts".
- dockercd has selfHeal=true/false but needs per-service exclusion annotations.

## 6.3 Drift Report API
- Feature: GET /api/v1/applications/{name}/drift
  Returns: which services are out of sync, what fields differ, for how long.
- No existing Docker Compose tool exposes this as a structured API response.

