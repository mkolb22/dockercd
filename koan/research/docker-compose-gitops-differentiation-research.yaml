# SECTION 1: ECOSYSTEM LANDSCAPE

## 1.1 Existing Tools and Their Gaps

### Watchtower
- Purpose: Image-only auto-updater. Pulls new image tags, restarts containers.
- Critical gap: No GitOps. No compose file tracking. No diff. No health wait. No sync waves.
- Broken: Incompatible with Docker Engine 28/29+ as of 2025 (maintenance dead).
- Community pain: Users report "endless restart loops", "API version errors".
- Feature requests open: Better HTTP API, per-container scheduling, proper metrics, secret handling.
- Verdict: Not a competitor -- it is a narrow image updater. Its death creates opportunity.

### Doco-CD (github.com/kimdre/doco-cd)
- Purpose: Lightweight GitOps for Docker Compose via polling + webhooks. Written in Go.
- What it does: Pull-based sync from Git to docker compose up. SOPS secrets. Prometheus metrics.
- Critical gaps:
  - No web UI
  - No diff visualization (no "what will change before apply")
  - No sync history / audit trail
  - No health-aware sync (does not wait for healthy before declaring success)
  - No rollback mechanism
  - No sync waves / ordering beyond compose depends_on
  - No notifications (Slack/webhook on deploy events)
  - No multi-app dependency graph
  - No RBAC or multi-user support
  - No resource metrics per application
- Community reception: Praised for being "WAY lighter than Portainer", but "no UI" is the top complaint.

### ConOps (github.com/anuragxxd/conops)
- Purpose: "ArgoCD without Kubernetes" -- self-healing, reconciliation loop for Docker Compose.
- What it does: Git-driven deploys, reconciliation interval, web UI and REST API, SQLite/Postgres.
- Critical gaps:
  - No webhook support (polling only)
  - No rollback mechanism
  - No secrets management
  - No health checks and alerting
  - No advanced scheduling
  - No RBAC
  - Limited to single-node
- Note: Very recently created (2025). Appears to be early-stage and confirms the market gap.

### Portainer (Community + Business Edition)
- Purpose: Full container management platform. GitOps as a feature, not core purpose.
- What it does: Stack management with Git polling/webhooks, UI for all Docker operations.
- Critical gaps for pure GitOps:
  - Relative bind mount bug on GitOps polling with private repos (was a known pain point)
  - Multi-user/RBAC only in paid Business edition
  - No diff visualization before sync
  - GitOps is a side feature -- not the primary UX
  - Heavy: full platform overhead for teams that only want GitOps
  - Minimum polling interval enforcement (was a bug, now "fixed" with a floor value)
  - No sync waves for Docker Compose
  - No health-gated sync (does not wait for containers healthy)
  - No audit trail of sync operations per app
- Verdict: Closest to a full platform but GitOps is not first-class. Heavy for single-purpose use.

### Komodo (komo.do)
- Purpose: Build + deploy system for Docker Compose across multiple servers.
- What it does: Multi-server management, auto-update stacks from Git, image building, monitoring dashboard.
- Strengths: Multi-host, open-source (no paid tier), strong UI, auto-update from Git.
- Critical gaps:
  - Three-component architecture (Core + Periphery agents) -- not single-binary
  - No declarative diff (shows what happened, not what WILL happen)
  - No sync waves
  - Limited health-awareness beyond container state
  - No GitOps drift reconciliation loop (it's push-triggered, not continuous pull)
  - No SOPS/secrets integration
  - No rollback from Git SHA

### Dokploy
- Purpose: Heroku-like PaaS for self-hosted. Docker Compose deployments via UI.
- What it does: Deploy from Git, preview deployments, monitoring, database management.
- Critical gaps:
  - Rollback only works for Dockerfile-based deployments, NOT Docker Compose (issue #2771, #827, #319)
  - No GitOps reconciliation loop (push-triggered, not continuous reconciliation)
  - No diff visualization
  - No sync waves
  - No drift detection
  - Not lightweight -- full PaaS

### Coolify
- Purpose: Full PaaS (like Heroku). Not a GitOps tool.
- Not a direct competitor but shows community appetite for self-hosted deployment platforms.

### Kamal
- Purpose: Push-based deployment for single/multi-server Docker deployments.
- Model: SSH-based, push-triggered. Not GitOps (no pull/reconciliation).
- Critical gaps for GitOps users:
  - Push-based only (violates GitOps pull principle)
  - Requires Docker registry (no compose-native image builds)
  - No continuous reconciliation
  - No drift detection or self-healing
  - Accessories limited to one published port
  - No diff visualization

