# SECTION 7: SYNTHESIS -- TOP DIFFERENTIATING FEATURES

## Priority Ranking (Technical Feasibility x Market Gap x User Demand)

### TIER 1: Highest Impact, Feasible in Single Binary Go

1. **Rollback to any Git SHA** [P0]
   - Market gap: ALL tools lack this for Docker Compose deployments.
   - Implementation: Store compose spec snapshot per sync SHA in SQLite.
     Re-deploy from snapshot on rollback request.
   - User demand: #1 requested feature across Dokploy, Docker Compose, Docker forums.
   - Effort: Medium. Requires snapshot storage + re-deploy path.

2. **Diff Preview before Sync (dry-run mode)** [P0]
   - Market gap: No tool shows "what will change" before applying.
   - Implementation: dockercd already has differ module -- expose as GET /diff endpoint and in UI.
   - User demand: HIGH. "I want to see what will change before it deploys."
   - Effort: Low. Core engine exists. Needs API + UI surfacing.

3. **Sync Waves with Health Gates** [P0]
   - Market gap: Zero Docker Compose tools implement this.
   - Implementation: labels on compose services (com.dockercd.sync-wave=0).
     Deployer processes waves in order, waits for health gate before next wave.
   - User demand: HIGH for teams with database-first ordering requirements.
   - Effort: Medium. Deployer needs wave-aware execution loop.

4. **Structured Notifications (Slack/webhook/email)** [P1]
   - Market gap: doco-cd has basic notifications. Others lack structured event-based alerts.
   - Implementation: notification subsystem with configurable triggers (SyncFailed, Degraded,
     OutOfSync, Synced) and channels (Slack webhook, generic webhook, SMTP).
   - User demand: HIGH. Teams need to know when deployments fail.
   - Effort: Medium. Pure HTTP/SMTP calls, no complex infrastructure.

5. **Secrets via SOPS/age (Encrypted-in-Git)** [P1]
   - Market gap: Only doco-cd does this. Others leave secrets in plaintext in Git.
   - Implementation: Detect encrypted files in repo path. Decrypt with age private key
     (mounted as Docker secret). Pass decrypted values to compose.
   - User demand: HIGH security concern across all tools.
   - Effort: Medium. Go age library available.

6. **Adopt Existing Stack (Import Live State)** [P1]
   - Market gap: No tool offers this. Every tool requires starting fresh.
   - Implementation: POST /api/v1/applications/{name}/adopt
     Inspects running containers, generates initial app record with current compose spec.
   - User demand: HIGH for users migrating from manual management.
   - Effort: Low-Medium. Uses existing inspector + store.

### TIER 2: High Impact, Moderate Complexity

7. **Image Update Policy (Registry Polling + Git PR)** [P2]
   - Market gap: Watchtower-style image watching, but GitOps-compliant (PR to bump tag).
   - Implementation: Per-app image polling. On new tag: optionally auto-update compose file
     in Git and create PR. OR directly deploy if imageUpdatePolicy=automated.
   - User demand: HIGH among users migrating from Watchtower.
   - Effort: High. Requires Git write access (PR creation) + registry API polling.

8. **Multi-Host Management (Remote Docker)** [P2]
   - Market gap: Most tools are single-host. Komodo requires agents.
   - Implementation: dockercd already has DockerHost in DestinationSpec.
     Apps can target tcp:// or ssh:// remote Docker hosts. No agent needed.
   - User demand: MEDIUM. Teams with 2-10 servers.
   - Effort: Low. Docker SDK supports remote hosts natively.

9. **Per-Service Drift Exclusions** [P2]
   - Market gap: selfHeal reverts all changes. Need ability to exclude specific services.
   - Implementation: annotation on compose service: com.dockercd.ignore-drift=true.
     Differ skips excluded services. selfHeal does not revert them.
   - User demand: MEDIUM.
   - Effort: Low. Modifier to differ logic.

10. **Pre/Post Sync Hooks (Service-as-Hook)** [P2]
    - Market gap: No Docker Compose tool implements pre/post sync hooks properly.
    - Implementation: Labels on compose service: com.dockercd.hook=pre-sync.
      Deployer runs labeled services as one-shot containers before/after main sync.
      Hook failure blocks sync (for pre-sync) or marks degraded (for post-sync).
    - User demand: HIGH for migration jobs, test runs, cache warmup.
    - Effort: Medium. Deployer needs hook-aware execution.

### TIER 3: Differentiating but Higher Complexity

11. **Blue-Green Deployment Strategy** [P3]
    - Market gap: Zero tools automate this for Docker Compose.
    - Implementation: dockercd.strategy=blue-green label on app.
      Manages two project instances. After healthy new version, flips Traefik/nginx routing labels.
      Old version kept for configurable window (rollback window).
    - User demand: MEDIUM-HIGH for production zero-downtime deployments.
    - Effort: HIGH. Requires router awareness (Traefik/nginx label manipulation).

12. **Referenced Secrets from External Stores** [P3]
    - Market gap: No tool fetches secrets from Vault/AWS SM at deploy time.
    - Implementation: Pluggable provider interface. Fetch at compose variable substitution stage.
      Vault provider. AWS Secrets Manager provider. Doppler provider.
    - User demand: HIGH for enterprise/security-conscious teams.
    - Effort: HIGH. Multiple provider integrations.

13. **Canary Deployment Strategy** [P4]
    - Market gap: Zero tools automate this for Docker Compose.
    - Very high complexity. Deferred.

