id: "arch-20260215-dockercd-poc"
status: "completed"
estimated_risk: "medium"
summary: "Modular Go architecture with 13 internal packages, interface-driven boundaries, worker-pool concurrency, SQLite persistence, and 10-phase development plan"

details:
  story_id: "story-20260215-dockercd-poc"

  approaches_evaluated:
    - name: "Monolithic single-package implementation"
      pros:
        - "Simplest to start"
        - "No import cycles to worry about"
      cons:
        - "Untestable without real Docker/Git"
        - "No separation of concerns"
        - "Cannot mock dependencies"
      score: "3/10"

    - name: "Interface-driven modular architecture with dependency injection"
      pros:
        - "Every module independently testable with mocks"
        - "Clear separation of concerns"
        - "Dependency graph prevents circular imports"
        - "Standard Go architecture pattern"
      cons:
        - "More files and boilerplate upfront"
        - "Requires careful interface design"
      score: "9/10"

    - name: "Plugin-based architecture with dynamic loading"
      pros:
        - "Maximum extensibility"
        - "Modules can be replaced at runtime"
      cons:
        - "Go plugins are platform-specific"
        - "Overkill for PoC scope"
        - "Complex build process"
      score: "2/10"

  selected_approach:
    name: "Interface-driven modular architecture with dependency injection"
    justification: |
      Go interfaces enable clean boundaries between modules. Each module
      (gitsync, parser, inspector, differ, deployer, health, events, store)
      has a defined interface. The reconciler orchestrates them through
      interfaces, not concrete types. This means every module can be unit
      tested with mock dependencies, and the integration test only needs
      to verify the wiring. This is the standard Go architecture pattern
      used by Docker, Kubernetes, and other infrastructure tools.

  technical_design:
    modules:
      - name: "app"
        purpose: "Domain types and validation (leaf module, no dependencies)"
        key_types:
          - "Application"
          - "SyncStatus"
          - "HealthStatus"
          - "SyncResult"
          - "ComposeSpec"
          - "DiffResult"
          - "ServiceState"

      - name: "config"
        purpose: "Configuration loading and validation via viper"

      - name: "store"
        purpose: "SQLite persistence with embedded migrations"

      - name: "gitsync"
        purpose: "Git clone, pull, change detection via go-git"

      - name: "parser"
        purpose: "Docker Compose YAML parsing with override merge and variable substitution"

      - name: "inspector"
        purpose: "Docker API integration for live state collection"

      - name: "differ"
        purpose: "Pure-function diff computation between desired and live state"

      - name: "deployer"
        purpose: "Docker Compose CLI execution for deployments"

      - name: "health"
        purpose: "Container health monitoring and worst-child-status aggregation"

      - name: "events"
        purpose: "Docker event stream subscription for self-healing"

      - name: "reconciler"
        purpose: "Core orchestration loop with scheduler and worker pool"

      - name: "api"
        purpose: "REST API server with chi router"

      - name: "cli"
        purpose: "Cobra CLI commands for serve, list, get, sync, diff"

    concurrency_model: |
      Worker pool (default 4 workers) with bounded work queue.
      Per-app mutex prevents concurrent reconciliation of the same app.
      Scheduler goroutine manages poll intervals and trigger channel.
      Event watcher goroutine subscribes to Docker events with debouncing.
      API server goroutine handles HTTP requests.
      Graceful shutdown with 30-second timeout for in-flight work.

    data_flow:
      - "Application manifests loaded from config directory on startup"
      - "Scheduler triggers reconciliation based on poll interval or manual trigger"
      - "Worker acquires per-app lock and runs reconciliation algorithm"
      - "Git sync fetches latest commit, compares SHA with last synced"
      - "Parser reads compose files from cloned repo, produces ComposeSpec"
      - "Inspector queries Docker API, produces []ServiceState"
      - "Differ compares ComposeSpec vs ServiceState, produces DiffResult"
      - "If automated and diff exists: deployer runs docker compose pull + up"
      - "Health monitor polls until all services healthy or timeout"
      - "Store records sync result, events, and updated status"
      - "Event watcher listens for container deaths, triggers re-reconciliation"

    security_considerations:
      - "Docker socket access grants root-equivalent permissions - documented clearly"
      - "Container runs as non-root (UID 1000) with Docker group membership"
      - "Docker API calls scoped to managed projects via label filters"
      - "API has no auth in PoC - document as localhost-only"
      - "Git credentials in manifest URLs - recommend file permission restrictions"

  risks:
    - risk: "Reconciliation loops from faulty diff engine"
      severity: "high"
      mitigation: "Circuit breaker (3 consecutive failures pauses for 5 minutes). Comprehensive diff engine unit tests."

    - risk: "Docker socket security implications"
      severity: "high"
      mitigation: "Clear documentation. Recommend socket proxy. Scope API calls by label."

    - risk: "Compose file parsing edge cases"
      severity: "medium"
      mitigation: "Support core v3.8 only. Document limitations. Fallback to docker compose config available."

    - risk: "Health monitoring false positives"
      severity: "medium"
      mitigation: "Conservative default timeout (120s). Per-app configurable timeout. Verbose health transition logging."

  development_phases:
    - phase: 1
      name: "Scaffolding, Config, Store, App Model"
      files: 12
      interfaces: ["Store"]

    - phase: 2
      name: "Git Sync Module"
      files: 3
      interfaces: ["GitSyncer"]

    - phase: 3
      name: "Compose Parser + Live State Inspector"
      files: 8
      interfaces: ["ComposeParser", "StateInspector"]

    - phase: 4
      name: "Diff Engine"
      files: 4
      interfaces: ["StateDiffer"]

    - phase: 5
      name: "Deployer Module"
      files: 3
      interfaces: ["Deployer"]

    - phase: 6
      name: "Reconciliation Loop"
      files: 4
      interfaces: ["Reconciler"]

    - phase: 7
      name: "Health Monitor + Self-Healing"
      files: 5
      interfaces: ["HealthChecker", "EventWatcher"]

    - phase: 8
      name: "API Server + CLI"
      files: 9
      interfaces: []

    - phase: 9
      name: "Containerization + Integration Tests"
      files: 4
      interfaces: []

    - phase: 10
      name: "Documentation + Examples"
      files: 7
      interfaces: []

  metadata:
    created_at: "2026-02-15T00:00:00Z"
    concept: "architecture"
    model: "opus"
    design_document: "docs/design.md"
    total_files: 59
    total_interfaces: 9
    total_phases: 10
