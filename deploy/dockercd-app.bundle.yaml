# Reference copy of the bundle-mode self-monitoring manifest.
# The canonical version used by the bootstrap overlay is: applications/dockercd.yaml
# Do not mount both — they define the same app and would conflict on registration.
apiVersion: dockercd/v1
kind: Application
metadata:
  name: dockercd
spec:
  source:
    repoURL: http://dockercd:dockercd123@gitea:3000/dockercd/dockercd.git
    targetRevision: main
    path: deploy/
    composeFiles:
      - docker-compose.yml
  destination:
    dockerHost: unix:///var/run/docker.sock
    projectName: dockercd
  syncPolicy:
    automated: true
    prune: true
    selfHeal: true
    pollInterval: 180s
