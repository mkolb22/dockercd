services:
  dockercd:
    image: dockercd:latest
    pull_policy: never
    container_name: dockercd
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - dockercd-state:/data
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      DOCKERCD_DATA_DIR: /data
      DOCKERCD_CONFIG_DIR: /config/applications
      DOCKERCD_LOG_LEVEL: info
      DOCKERCD_API_PORT: "8080"
      DOCKERCD_GIT_TOKEN: ${DOCKERCD_GIT_TOKEN:-}
      DOCKERCD_E2E_TEST: "1"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - dockercd-net

volumes:
  dockercd-state:

networks:
  dockercd-net:
    external: true
