services:
  selfheal-test:
    image: nginx:alpine
    container_name: selfheal-test
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/"]
      interval: 5s
      timeout: 2s
      retries: 3
      start_period: 5s
    networks:
      - dockercd-net

networks:
  dockercd-net:
    external: true
