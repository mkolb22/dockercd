apiVersion: dockercd/v1
kind: Application
metadata:
  name: dockercd
spec:
  source:
    repoURL: http://dockercd:dockercd123@gitea:3000/dockercd/dockercd.git
    targetRevision: main
    path: deploy/
    composeFiles:
      - docker-compose.yml
  destination:
    dockerHost: unix:///var/run/docker.sock
    projectName: dockercd
  syncPolicy:
    automated: false
    prune: false
    selfHeal: false
    pollInterval: 180s
