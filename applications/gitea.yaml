apiVersion: dockercd/v1
kind: Application
metadata:
  name: gitea
spec:
  source:
    repoURL: http://gitea:3000/dockercd/dockercd.git
    targetRevision: main
    path: applications/gitea/
    composeFiles:
      - docker-compose.yml
  destination:
    dockerHost: unix:///var/run/docker.sock
    projectName: gitea
  syncPolicy:
    automated: true
    prune: true
    selfHeal: true
    pollInterval: 180s
