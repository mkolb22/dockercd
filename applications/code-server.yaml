apiVersion: dockercd/v1
kind: Application
metadata:
  name: code-server
spec:
  source:
    repoURL: https://github.com/mkolb22/dockercd.git
    targetRevision: main
    path: applications/code-server/
    composeFiles:
      - docker-compose.yml
  destination:
    dockerHost: unix:///var/run/docker.sock
    projectName: code-server
  syncPolicy:
    automated: true
    prune: true
    selfHeal: true
    pollInterval: 180s
